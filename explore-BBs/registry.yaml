# IBM Building Blocks — curated catalog
#
# This file is consumed by the Building Blocks MCP server to organize blocks
# into capabilities and groups, and to expose curated metadata (products, tags,
# docs links) that isn't derivable from the directory structure alone.
#
# To add a new block: append an entry to `blocks:` keyed by its `repo_path`.

# ---- Capabilities (top-level organization) ----
capabilities:
  - id: ai
    name: "AI"
    description: "AI agents and AI trust capabilities"
  - id: data
    name: "Data"
    description: "Data integration, intelligence, and retrieval"
  - id: automation
    name: "Automation"
    description: "Build & deploy, optimize, and secure"

# ---- Groups within each capability ----
groups:
  - id: agents
    name: "Agents"
    capability: ai
  - id: ai-trust
    name: "AI Trust"
    capability: ai
  - id: integration
    name: "Integration"
    capability: data
  - id: intelligence
    name: "Intelligence"
    capability: data
  - id: retrieval
    name: "Retrieval"
    capability: data
  - id: build
    name: "Build & Deploy"
    capability: automation
  - id: optimize
    name: "Optimize"
    capability: automation
  - id: secure
    name: "Secure"
    capability: automation

# ---- Per-block metadata (keyed by repo_path) ----
# Required: repo_path. Optional: name, group, docs_path, products, tags.
blocks:
  # ===== AI > Agents =====
  - repo_path: agents/agent-builder
    name: "Agent Builder"
    group: agents
    docs_path: ai-core/agents/agent-builder.md
    products: ["watsonx Orchestrate"]
    tags: [agents, adk, orchestration, bob-modes]

  - repo_path: agents/multi-agent-orchestration
    name: "Multi-Agent Orchestration"
    group: agents
    docs_path: ai-core/agents/multi-agent-orchestration.md
    products: ["watsonx Orchestrate"]
    tags: [agents, multi-agent, orchestration, mcp, a2a]

  - repo_path: agents/agentic-sdlc
    name: "Agentic SDLC"
    group: agents
    docs_path: ai-core/agents/agentic-sdlc.md
    products: ["watsonx Orchestrate"]
    tags: [agents, sdlc, development, agentic]

  # ===== AI > AI Trust =====
