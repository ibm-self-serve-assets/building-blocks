# Sample threshold-override config for real-time-guardrails.
# Load via: GuardrailsEvaluator(config_path="thresholds.yaml")
# or auto-discover via GUARDRAILS_CONFIG_PATH=./thresholds.yaml

# Category-level shortcuts (apply to every metric in the category that does
# not have an explicit per-metric override below).
defaults:
  safety: 0.6           # default 0.65 — slightly stricter safety policy
  rag_generation: 0.15  # default 0.1
  rag_retrieval: 0.15
  quality: 0.1
  topic: 0.1
  pattern: 0.5
  tool_call: 0.1

# Per-metric overrides. Use the display name exactly as it appears in
# `GET /api/metrics` or `GuardrailsEvaluator.list_metrics()`.
metrics:
  "PII Detection": 0.7
  "Jailbreak Detection": 0.5
  "Faithfulness": 0.2
