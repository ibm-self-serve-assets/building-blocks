# Voice Agent Credentials Template
# Copy this file to credentials.yaml and fill in actual values
# DO NOT commit credentials.yaml to version control
# Add credentials.yaml to .gitignore

# Watson Speech Services
watson:
  stt:
    api_key: "YOUR_WATSON_STT_API_KEY"
    service_url: "https://api.us-south.speech-to-text.watson.cloud.ibm.com"
    # Alternative regions:
    # us-east: https://api.us-east.speech-to-text.watson.cloud.ibm.com
    # eu-gb: https://api.eu-gb.speech-to-text.watson.cloud.ibm.com
    # eu-de: https://api.eu-de.speech-to-text.watson.cloud.ibm.com
  
  tts:
    api_key: "YOUR_WATSON_TTS_API_KEY"
    service_url: "https://api.us-south.text-to-speech.watson.cloud.ibm.com"
    # Alternative regions:
    # us-east: https://api.us-east.text-to-speech.watson.cloud.ibm.com
    # eu-gb: https://api.eu-gb.text-to-speech.watson.cloud.ibm.com
    # eu-de: https://api.eu-de.text-to-speech.watson.cloud.ibm.com

# watsonx Orchestrate
orchestrate:
  api_key: "YOUR_ORCHESTRATE_API_KEY"
  url: "https://your-instance.watson-orchestrate.ibm.com"
  space_id: "YOUR_SPACE_ID"
  # Get these from your watsonx Orchestrate instance settings

# Channel Integrations
channels:
  # Genesys Audio Connector (for phone)
  genesys:
    api_key: "YOUR_GENESYS_API_KEY"
    client_secret: "YOUR_GENESYS_CLIENT_SECRET"
    region: "us-east-1"  # or your Genesys region
    # Get from Genesys Cloud Admin > Integrations
  
  # Twilio (for WhatsApp and SMS)
  twilio:
    account_sid: "YOUR_TWILIO_ACCOUNT_SID"
    auth_token: "YOUR_TWILIO_AUTH_TOKEN"
    whatsapp_number: "whatsapp:+14155238886"  # Your WhatsApp-enabled number
    sms_number: "+15551234567"  # Your SMS-enabled number
    # Get from Twilio Console: https://console.twilio.com
  
  # Slack (for internal bots)
  slack:
    bot_token: "xoxb-YOUR-BOT-TOKEN"
    signing_secret: "YOUR_SIGNING_SECRET"
    app_id: "YOUR_APP_ID"
    # Get from Slack API: https://api.slack.com/apps

# Optional: Google Cloud (alternative STT/TTS provider)
google:
  service_account_json: "path/to/service-account.json"
  project_id: "YOUR_PROJECT_ID"
  # Get from Google Cloud Console

# Optional: Azure Cognitive Services (alternative STT/TTS provider)
azure:
  subscription_key: "YOUR_AZURE_SUBSCRIPTION_KEY"
  region: "eastus"  # or your Azure region
  # Get from Azure Portal

# Environment Configuration
environment:
  name: "development"  # development, staging, production
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  enable_monitoring: true
  enable_recording: false  # Set to true if call recording is required

# Security Settings
security:
  enable_webhook_verification: true
  rotate_credentials_days: 90
  require_ssl: true

