---
# Install Vault binary

- name: Check if Vault is already installed
  stat:
    path: "{{ vault_bin_path }}"
  register: vault_binary

- name: Get installed Vault version
  command: "{{ vault_bin_path }} version"
  register: installed_version
  changed_when: false
  failed_when: false
  when: vault_binary.stat.exists

- name: Download Vault
  get_url:
    url: "{{ vault_download_url }}"
    dest: "/tmp/vault_{{ vault_version }}.zip"
    mode: '0644'
  when: not vault_binary.stat.exists or vault_version not in installed_version.stdout | default('')

- name: Unzip Vault binary
  unarchive:
    src: "/tmp/vault_{{ vault_version }}.zip"
    dest: "/usr/local/bin"
    remote_src: yes
    mode: '0755'
    owner: root
    group: root
  when: not vault_binary.stat.exists or vault_version not in installed_version.stdout | default('')

- name: Remove Vault zip file
  file:
    path: "/tmp/vault_{{ vault_version }}.zip"
    state: absent

- name: Set Vault binary capabilities
  capabilities:
    path: "{{ vault_bin_path }}"
    capability: cap_ipc_lock=+ep
    state: present

- name: Verify Vault installation
  command: "{{ vault_bin_path }} version"
  register: vault_version_output
  changed_when: false

- name: Display Vault version
  debug:
    msg: "Installed Vault version: {{ vault_version_output.stdout }}"

