---
# System Dependencies Installation Tasks

- name: Install required system packages
  package:
    name:
      - unzip
      - git
      - curl
      - wget
    state: present
  become: true

- name: Check if Podman is installed
  command: which podman
  register: podman_check
  failed_when: false
  changed_when: false

- name: Install Podman (RHEL/CentOS/Fedora)
  package:
    name: podman
    state: present
  become: true
  when: 
    - podman_check.rc != 0
    - ansible_os_family == "RedHat"

- name: Check if Java 11 is installed
  shell: java -version 2>&1 | grep -q "11\."
  register: java_check
  failed_when: false
  changed_when: false

- name: Install Java 11 (RHEL/CentOS/Fedora)
  package:
    name: java-11-openjdk
    state: present
  become: true
  when:
    - java_check.rc != 0
    - ansible_os_family == "RedHat"

- name: Check if OpenShift CLI is installed
  command: which oc
  register: oc_check
  failed_when: false
  changed_when: false

- name: Download and install OpenShift CLI
  block:
    - name: Create temporary directory for OC CLI
      tempfile:
        state: directory
        suffix: oc_cli
      register: oc_temp_dir

    - name: Download OpenShift CLI
      get_url:
        url: "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/{{ openshift_cli_version }}/openshift-client-linux.tar.gz"
        dest: "{{ oc_temp_dir.path }}/openshift-client-linux.tar.gz"
        mode: '0644'

    - name: Extract OpenShift CLI
      unarchive:
        src: "{{ oc_temp_dir.path }}/openshift-client-linux.tar.gz"
        dest: "{{ oc_temp_dir.path }}"
        remote_src: yes

    - name: Install OpenShift CLI to /usr/local/bin
      copy:
        src: "{{ oc_temp_dir.path }}/oc"
        dest: /usr/local/bin/oc
        mode: '0755'
        remote_src: yes
      become: true

    - name: Install kubectl to /usr/local/bin
      copy:
        src: "{{ oc_temp_dir.path }}/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'
        remote_src: yes
      become: true

    - name: Clean up temporary directory
      file:
        path: "{{ oc_temp_dir.path }}"
        state: absent
  when: oc_check.rc != 0

- name: Verify OpenShift CLI installation
  command: /usr/local/bin/oc version --client
  register: oc_version
  changed_when: false

- name: Display OpenShift CLI version
  debug:
    msg: "{{ oc_version.stdout }}"

- name: Check if JMeter is installed
  stat:
    path: "{{ jmeter_install_dir }}/apache-jmeter-{{ jmeter_version }}"
  register: jmeter_check

- name: Download and install Apache JMeter
  block:
    - name: Create JMeter installation directory
      file:
        path: "{{ jmeter_install_dir }}"
        state: directory
        mode: '0755'
      become: true

    - name: Download Apache JMeter
      get_url:
        url: "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-{{ jmeter_version }}.tgz"
        dest: "/tmp/apache-jmeter-{{ jmeter_version }}.tgz"
        mode: '0644'

    - name: Extract Apache JMeter
      unarchive:
        src: "/tmp/apache-jmeter-{{ jmeter_version }}.tgz"
        dest: "{{ jmeter_install_dir }}"
        remote_src: yes
      become: true

    - name: Create JMeter symlink
      file:
        src: "{{ jmeter_install_dir }}/apache-jmeter-{{ jmeter_version }}"
        dest: "{{ jmeter_install_dir }}/current"
        state: link
      become: true

    - name: Clean up JMeter archive
      file:
        path: "/tmp/apache-jmeter-{{ jmeter_version }}.tgz"
        state: absent
  when: not jmeter_check.stat.exists

- name: Check if JMeter symlink exists
  stat:
    path: "{{ jmeter_install_dir }}/current"
  register: jmeter_symlink_check

- name: Verify JMeter installation
  command: "{{ jmeter_install_dir }}/current/bin/jmeter --version"
  register: jmeter_version_output
  changed_when: false
  when: jmeter_symlink_check.stat.exists

- name: Verify JMeter installation (direct path)
  command: "{{ jmeter_install_dir }}/apache-jmeter-{{ jmeter_version }}/bin/jmeter --version"
  register: jmeter_version_direct
  changed_when: false
  when: not jmeter_symlink_check.stat.exists and jmeter_check.stat.exists

- name: Display JMeter version
  debug:
    msg: "{{ jmeter_version_output.stdout if jmeter_symlink_check.stat.exists else jmeter_version_direct.stdout }}"
  when: jmeter_symlink_check.stat.exists or jmeter_check.stat.exists

- name: Check if Trivy is installed
  command: which trivy
  register: trivy_check
  failed_when: false
  changed_when: false

- name: Download and install Trivy
  block:
    - name: Create temporary directory for Trivy
      tempfile:
        state: directory
        suffix: trivy
      register: trivy_temp_dir

    - name: Download Trivy
      get_url:
        url: "https://github.com/aquasecurity/trivy/releases/download/v{{ trivy_version }}/trivy_{{ trivy_version }}_Linux-64bit.tar.gz"
        dest: "{{ trivy_temp_dir.path }}/trivy.tar.gz"
        mode: '0644'

    - name: Extract Trivy
      unarchive:
        src: "{{ trivy_temp_dir.path }}/trivy.tar.gz"
        dest: "{{ trivy_temp_dir.path }}"
        remote_src: yes

    - name: Install Trivy to /usr/local/bin
      copy:
        src: "{{ trivy_temp_dir.path }}/trivy"
        dest: /usr/local/bin/trivy
        mode: '0755'
        remote_src: yes
      become: true

    - name: Clean up temporary directory
      file:
        path: "{{ trivy_temp_dir.path }}"
        state: absent
  when: trivy_check.rc != 0

- name: Verify Trivy installation
  command: /usr/local/bin/trivy --version
  register: trivy_version_output
  changed_when: false
  when: trivy_check.rc != 0 or trivy_check.rc == 0

- name: Display Trivy version
  debug:
    msg: "{{ trivy_version_output.stdout }}"

- name: Check if Vault is installed
  command: which vault
  register: vault_check
  failed_when: false
  changed_when: false

- name: Download and install HashiCorp Vault
  block:
    - name: Create temporary directory for Vault
      tempfile:
        state: directory
        suffix: vault
      register: vault_temp_dir

    - name: Download Vault
      get_url:
        url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
        dest: "{{ vault_temp_dir.path }}/vault.zip"
        mode: '0644'

    - name: Extract Vault
      unarchive:
        src: "{{ vault_temp_dir.path }}/vault.zip"
        dest: "{{ vault_temp_dir.path }}"
        remote_src: yes

    - name: Install Vault to /usr/local/bin
      copy:
        src: "{{ vault_temp_dir.path }}/vault"
        dest: /usr/local/bin/vault
        mode: '0755'
        remote_src: yes
      become: true

    - name: Clean up temporary directory
      file:
        path: "{{ vault_temp_dir.path }}"
        state: absent
  when: vault_check.rc != 0

- name: Verify Vault installation
  command: /usr/local/bin/vault version
  register: vault_version_output
  changed_when: false

- name: Display Vault version
  debug:
    msg: "{{ vault_version_output.stdout }}"

# Vault Configuration and Setup
- name: Create Vault configuration directory
  file:
    path: "{{ vault_config_dir }}"
    state: directory
    mode: '0755'
  become: true

- name: Create Vault data directory
  file:
    path: "{{ vault_data_dir }}"
    state: directory
    mode: '0755'
  become: true

- name: Create Vault log directory
  file:
    path: "{{ vault_log_dir }}"
    state: directory
    mode: '0755'
  become: true

- name: Create Vault configuration file
  copy:
    dest: "{{ vault_config_dir }}/vault.hcl"
    content: |
      storage "file" {
        path = "{{ vault_data_dir }}"
      }

      listener "tcp" {
        address     = "127.0.0.1:8200"
        tls_disable = 1
      }

      api_addr = "{{ vault_address }}"
      cluster_addr = "https://127.0.0.1:8201"
      ui = true
      log_level = "Info"
    mode: '0644'
  become: true

- name: Create Vault systemd service file
  copy:
    dest: /etc/systemd/system/vault.service
    content: |
      [Unit]
      Description=HashiCorp Vault
      Documentation=https://www.vaultproject.io/docs/
      Requires=network-online.target
      After=network-online.target
      ConditionFileNotEmpty={{ vault_config_dir }}/vault.hcl

      [Service]
      Type=notify
      User=root
      Group=root
      ProtectSystem=full
      ProtectHome=read-only
      PrivateTmp=yes
      PrivateDevices=yes
      SecureBits=keep-caps
      AmbientCapabilities=CAP_IPC_LOCK
      CapabilityBoundingSet=CAP_SYSLOG CAP_IPC_LOCK
      NoNewPrivileges=yes
      ExecStart=/usr/local/bin/vault server -config={{ vault_config_dir }}/vault.hcl
      ExecReload=/bin/kill --signal HUP $MAINPID
      KillMode=process
      KillSignal=SIGINT
      Restart=on-failure
      RestartSec=5
      TimeoutStopSec=30
      LimitNOFILE=65536
      LimitMEMLOCK=infinity

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  become: true
  notify: Reload systemd

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
  become: true

- name: Enable Vault service
  systemd:
    name: vault
    enabled: yes
  become: true

- name: Start Vault service
  systemd:
    name: vault
    state: started
  become: true

- name: Wait for Vault to be ready
  wait_for:
    host: 127.0.0.1
    port: 8200
    delay: 5
    timeout: 60

- name: Check if Vault is already initialized
  uri:
    url: "{{ vault_address }}/v1/sys/init"
    method: GET
    return_content: yes
  register: vault_init_status
  failed_when: false

- name: Initialize Vault
  uri:
    url: "{{ vault_address }}/v1/sys/init"
    method: POST
    body_format: json
    body:
      secret_shares: 5
      secret_threshold: 3
    return_content: yes
  register: vault_init_result
  when: not vault_init_status.json.initialized

- name: Save Vault unseal keys and root token
  copy:
    content: "{{ vault_init_result.json | to_nice_json }}"
    dest: "{{ vault_unseal_keys_file }}"
    mode: '0644'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  become: true
  when: vault_init_result.json is defined

- name: Display Vault initialization info
  debug:
    msg:
      - "Vault has been initialized!"
      - "Root Token: {{ vault_init_result.json.root_token }}"
      - "Unseal keys saved to: {{ vault_unseal_keys_file }}"
      - "IMPORTANT: Store these keys securely!"
  when: vault_init_result.json is defined

- name: Check if vault keys file exists
  stat:
    path: "{{ vault_unseal_keys_file }}"
  register: vault_keys_file_stat

- name: Read Vault unseal keys from file
  slurp:
    src: "{{ vault_unseal_keys_file }}"
  register: vault_keys_content
  when: vault_keys_file_stat.stat.exists

- name: Parse Vault keys
  set_fact:
    vault_keys: "{{ vault_keys_content.content | b64decode | from_json }}"
  when:
    - vault_keys_content is defined
    - vault_keys_content.content is defined

- name: Display message if Vault was already initialized
  debug:
    msg:
      - "Vault was already initialized."
      - "If you need to unseal Vault, please provide the unseal keys manually."
      - "Unseal keys file not found at: {{ vault_unseal_keys_file }}"
      - "You can unseal manually using: vault operator unseal <key>"
  when:
    - vault_init_status.json.initialized
    - not vault_keys_file_stat.stat.exists

- name: Check Vault seal status
  uri:
    url: "{{ vault_address }}/v1/sys/seal-status"
    method: GET
    return_content: yes
  register: vault_seal_status

- name: Unseal Vault (key 1)
  uri:
    url: "{{ vault_address }}/v1/sys/unseal"
    method: POST
    body_format: json
    body:
      key: "{{ vault_keys.keys_base64[0] }}"
    return_content: yes
  register: unseal_result_1
  when:
    - vault_seal_status.json.sealed
    - vault_keys is defined
    - vault_keys.keys_base64 is defined

- name: Unseal Vault (key 2)
  uri:
    url: "{{ vault_address }}/v1/sys/unseal"
    method: POST
    body_format: json
    body:
      key: "{{ vault_keys.keys_base64[1] }}"
    return_content: yes
  register: unseal_result_2
  when:
    - vault_seal_status.json.sealed
    - vault_keys is defined
    - vault_keys.keys_base64 is defined

- name: Unseal Vault (key 3)
  uri:
    url: "{{ vault_address }}/v1/sys/unseal"
    method: POST
    body_format: json
    body:
      key: "{{ vault_keys.keys_base64[2] }}"
    return_content: yes
  register: unseal_result_3
  when:
    - vault_seal_status.json.sealed
    - vault_keys is defined
    - vault_keys.keys_base64 is defined

- name: Verify Vault is unsealed
  uri:
    url: "{{ vault_address }}/v1/sys/seal-status"
    method: GET
    return_content: yes
  register: final_seal_status

- name: Display Vault status
  debug:
    msg:
      - "Vault Status:"
      - "  Sealed: {{ final_seal_status.json.sealed }}"
      - "  Initialized: {{ final_seal_status.json.initialized }}"
      - "  Cluster Name: {{ final_seal_status.json.cluster_name | default('N/A') }}"
      - "  Version: {{ final_seal_status.json.version }}"

- name: Display installation summary
  debug:
    msg:
      - "System dependencies installation completed"
      - "Podman: Installed"
      - "Java 11: Installed"
      - "OpenShift CLI: {{ oc_version.stdout }}"
      - "Apache JMeter: {{ jmeter_version }}"
      - "Trivy: {{ trivy_version }}"
      - "HashiCorp Vault: {{ vault_version }}"

