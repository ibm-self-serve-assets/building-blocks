---
# Application Deployment Tasks

- name: Ensure we're in the correct namespace
  command: oc project {{ namespace }}
  changed_when: false

- name: Deploy namespace (if using separate namespace manifest)
  command: oc apply -f {{ k8s_dir }}/namespace.yaml
  register: namespace_deploy
  failed_when: false
  changed_when: "'created' in namespace_deploy.stdout or 'configured' in namespace_deploy.stdout"

- name: Deploy PostgreSQL PVC
  command: oc apply -f {{ k8s_dir }}/postgres-pvc.yaml -n {{ namespace }}
  register: pvc_deploy
  changed_when: "'created' in pvc_deploy.stdout or 'configured' in pvc_deploy.stdout"

- name: Display PVC deployment status
  debug:
    msg: "PostgreSQL PVC deployed: {{ pvc_deploy.stdout }}"

- name: Deploy PostgreSQL deployment
  command: oc apply -f {{ k8s_dir }}/postgres-deployment.yaml -n {{ namespace }}
  register: postgres_deploy
  changed_when: "'created' in postgres_deploy.stdout or 'configured' in postgres_deploy.stdout"

- name: Display PostgreSQL deployment status
  debug:
    msg: "PostgreSQL deployment deployed: {{ postgres_deploy.stdout }}"

- name: Deploy PostgreSQL service
  command: oc apply -f {{ k8s_dir }}/postgres-service.yaml -n {{ namespace }}
  register: postgres_svc_deploy
  changed_when: "'created' in postgres_svc_deploy.stdout or 'configured' in postgres_svc_deploy.stdout"

- name: Display PostgreSQL service status
  debug:
    msg: "PostgreSQL service deployed: {{ postgres_svc_deploy.stdout }}"

- name: Wait for PostgreSQL pod to be ready
  command: >
    oc wait --for=condition=ready pod
    -l app=retail-postgres
    -n {{ namespace }}
    --timeout=300s
  register: postgres_ready
  changed_when: false
  retries: 2
  delay: 10
  until: postgres_ready.rc == 0

- name: Get PostgreSQL pod status details
  command: oc get pods -l app=retail-postgres -n {{ namespace }} -o wide
  register: postgres_pod_details
  changed_when: false

- name: Display PostgreSQL readiness status
  debug:
    msg:
      - "PostgreSQL is ready"
      - "{{ postgres_pod_details.stdout_lines }}"

- name: Save current backend deployment state for rollback
  command: oc get deployment retail-backend -n {{ namespace }} -o yaml
  register: backend_previous_state
  changed_when: false
  failed_when: false

- name: Deploy backend deployment
  command: oc apply -f {{ k8s_dir }}/backend-deployment.yaml -n {{ namespace }}
  register: backend_deploy
  changed_when: "'created' in backend_deploy.stdout or 'configured' in backend_deploy.stdout"

- name: Display backend deployment status
  debug:
    msg: "Backend deployment deployed: {{ backend_deploy.stdout }}"

- name: Deploy backend service
  command: oc apply -f {{ k8s_dir }}/backend-service.yaml -n {{ namespace }}
  register: backend_svc_deploy
  changed_when: "'created' in backend_svc_deploy.stdout or 'configured' in backend_svc_deploy.stdout"

- name: Display backend service status
  debug:
    msg: "Backend service deployed: {{ backend_svc_deploy.stdout }}"

- name: Deploy backend route
  command: oc apply -f {{ k8s_dir }}/backend-route.yaml -n {{ namespace }}
  register: backend_route_deploy
  changed_when: "'created' in backend_route_deploy.stdout or 'configured' in backend_route_deploy.stdout"

- name: Display backend route status
  debug:
    msg: "Backend route deployed: {{ backend_route_deploy.stdout }}"

- name: Deploy backend HPA
  command: oc apply -f {{ k8s_dir }}/retail-backend-hpa.yaml -n {{ namespace }}
  register: backend_hpa_deploy
  changed_when: "'created' in backend_hpa_deploy.stdout or 'configured' in backend_hpa_deploy.stdout"

- name: Display backend HPA status
  debug:
    msg: "Backend HPA deployed: {{ backend_hpa_deploy.stdout }}"

- name: Wait for backend pods to be ready
  command: >
    oc wait --for=condition=ready pod
    -l app=retail-backend
    -n {{ namespace }}
    --timeout=300s
  register: backend_ready
  changed_when: false
  retries: 2
  delay: 10
  until: backend_ready.rc == 0

- name: Get backend pod status details
  command: oc get pods -l app=retail-backend -n {{ namespace }} -o wide
  register: backend_pod_details
  changed_when: false

- name: Display backend readiness status
  debug:
    msg:
      - "Backend is ready"
      - "{{ backend_pod_details.stdout_lines }}"

- name: Get backend route URL
  command: oc get route retail-backend -n {{ namespace }} -o jsonpath='{.spec.host}'
  register: backend_route_url
  changed_when: false

- name: Set backend route fact
  set_fact:
    backend_route: "https://{{ backend_route_url.stdout }}"

- name: Display backend route
  debug:
- name: Verify backend health endpoint
  uri:
    url: "{{ backend_route }}/health"
    status_code: 200
    timeout: 30
    validate_certs: no
  register: backend_health
  retries: 5
  delay: 10
  until: backend_health.status == 200
  failed_when: false

- name: Display backend health status
  debug:
    msg: "Backend health check: {{ 'Passed' if backend_health.status == 200 else 'Failed - continuing anyway' }}"

    msg: "Backend route: {{ backend_route }}"

- name: Deploy frontend deployment
  command: oc apply -f {{ k8s_dir }}/frontend-deployment.yaml -n {{ namespace }}
  register: frontend_deploy
  changed_when: "'created' in frontend_deploy.stdout or 'configured' in frontend_deploy.stdout"

- name: Display frontend deployment status
  debug:
    msg: "Frontend deployment deployed: {{ frontend_deploy.stdout }}"

- name: Deploy frontend service
  command: oc apply -f {{ k8s_dir }}/frontend-service.yaml -n {{ namespace }}
  register: frontend_svc_deploy
  changed_when: "'created' in frontend_svc_deploy.stdout or 'configured' in frontend_svc_deploy.stdout"

- name: Display frontend service status
  debug:
    msg: "Frontend service deployed: {{ frontend_svc_deploy.stdout }}"

- name: Deploy frontend route
  command: oc apply -f {{ k8s_dir }}/frontend-route.yaml -n {{ namespace }}
  register: frontend_route_deploy
  changed_when: "'created' in frontend_route_deploy.stdout or 'configured' in frontend_route_deploy.stdout"

- name: Display frontend route status
  debug:
    msg: "Frontend route deployed: {{ frontend_route_deploy.stdout }}"

- name: Deploy frontend HPA
  command: oc apply -f {{ k8s_dir }}/retail-frontend-hpa.yaml -n {{ namespace }}
  register: frontend_hpa_deploy
  changed_when: "'created' in frontend_hpa_deploy.stdout or 'configured' in frontend_hpa_deploy.stdout"

- name: Display frontend HPA status
  debug:
    msg: "Frontend HPA deployed: {{ frontend_hpa_deploy.stdout }}"

- name: Wait for frontend pods to be ready
  command: >
    oc wait --for=condition=ready pod
    -l app=retail-frontend
    -n {{ namespace }}
    --timeout=300s
  register: frontend_ready
  changed_when: false
  retries: 2
  delay: 10
  until: frontend_ready.rc == 0

- name: Get frontend pod status details
  command: oc get pods -l app=retail-frontend -n {{ namespace }} -o wide
  register: frontend_pod_details
  changed_when: false

- name: Display frontend readiness status
  debug:
    msg:
      - "Frontend is ready"
      - "{{ frontend_pod_details.stdout_lines }}"

- name: Get frontend route URL
  command: oc get route retail-frontend -n {{ namespace }} -o jsonpath='{.spec.host}'
  register: frontend_route_url
  changed_when: false

- name: Set frontend route fact
  set_fact:
    frontend_route: "https://{{ frontend_route_url.stdout }}"

- name: Get all pods status
  command: oc get pods -n {{ namespace }}
  register: pods_status
  changed_when: false

- name: Display pods status
  debug:
    msg: "{{ pods_status.stdout_lines }}"

- name: Get all services
  command: oc get svc -n {{ namespace }}
  register: services_status
  changed_when: false

- name: Display services status
  debug:
    msg: "{{ services_status.stdout_lines }}"

- name: Get all routes
  command: oc get routes -n {{ namespace }}
  register: routes_status
  changed_when: false

- name: Display routes status
  debug:
    msg: "{{ routes_status.stdout_lines }}"

- name: Check if RAG secrets manifest exists
  stat:
    path: "{{ app_source_dir }}/k8s/rag-secrets.yaml"
  register: rag_secrets_check

- name: Deploy RAG secrets
  command: oc apply -f {{ app_source_dir }}/k8s/rag-secrets.yaml -n {{ namespace }}
  register: rag_secrets_deploy
  changed_when: "'created' in rag_secrets_deploy.stdout or 'configured' in rag_secrets_deploy.stdout"
  when: rag_secrets_check.stat.exists

- name: Display RAG secrets status
  debug:
    msg: "RAG secrets deployed: {{ rag_secrets_deploy.stdout }}"
  when: rag_secrets_check.stat.exists

- name: Check if RAG deployment manifest exists
  stat:
    path: "{{ app_source_dir }}/k8s/rag-deployment.yaml"
  register: rag_retrieval_deployment_check

- name: Deploy RAG Retrieval deployment
  command: oc apply -f {{ app_source_dir }}/k8s/rag-deployment.yaml -n {{ namespace }}
  register: rag_retrieval_deploy
  changed_when: "'created' in rag_retrieval_deploy.stdout or 'configured' in rag_retrieval_deploy.stdout"
  when: rag_retrieval_deployment_check.stat.exists

- name: Display RAG Retrieval deployment status
  debug:
    msg: "RAG Retrieval deployment deployed: {{ rag_retrieval_deploy.stdout }}"
  when: rag_retrieval_deployment_check.stat.exists

- name: Check if RAG Accelerator deployment manifest exists
  stat:
    path: "{{ k8s_dir }}/rag-deployment.yaml"
  register: rag_deployment_check

- name: Deploy RAG Accelerator deployment
  command: oc apply -f {{ k8s_dir }}/rag-deployment.yaml -n {{ namespace }}
  register: rag_deploy
  changed_when: "'created' in rag_deploy.stdout or 'configured' in rag_deploy.stdout"
  when: rag_deployment_check.stat.exists

- name: Display RAG Accelerator deployment status
  debug:
    msg: "RAG Accelerator deployment deployed: {{ rag_deploy.stdout }}"
  when: rag_deployment_check.stat.exists

- name: Check if RAG service manifest exists
  stat:
    path: "{{ k8s_dir }}/rag-service.yaml"
  register: rag_service_check

- name: Deploy RAG service
  command: oc apply -f {{ k8s_dir }}/rag-service.yaml -n {{ namespace }}
  register: rag_svc_deploy
  changed_when: "'created' in rag_svc_deploy.stdout or 'configured' in rag_svc_deploy.stdout"
  when: rag_service_check.stat.exists

- name: Display RAG service status
  debug:
    msg: "RAG service deployed: {{ rag_svc_deploy.stdout }}"
  when: rag_service_check.stat.exists

- name: Check if RAG route manifest exists
  stat:
    path: "{{ k8s_dir }}/rag-route.yaml"
  register: rag_route_check

- name: Deploy RAG route
  command: oc apply -f {{ k8s_dir }}/rag-route.yaml -n {{ namespace }}
  register: rag_route_deploy
  changed_when: "'created' in rag_route_deploy.stdout or 'configured' in rag_route_deploy.stdout"
  when: rag_route_check.stat.exists

- name: Display RAG route status
  debug:
    msg: "RAG route deployed: {{ rag_route_deploy.stdout }}"
  when: rag_route_check.stat.exists

- name: Wait for RAG Retrieval pods to be ready
  command: >
    oc wait --for=condition=ready pod
    -l app=rag-retrieval-api
    -n {{ namespace }}
    --timeout=300s
  register: rag_retrieval_ready
  changed_when: false
  retries: 2
  delay: 10
  until: rag_retrieval_ready.rc == 0
  when: rag_retrieval_deployment_check.stat.exists
  failed_when: false

- name: Get RAG Retrieval pod status details
  command: oc get pods -l app=rag-retrieval-api -n {{ namespace }} -o wide
  register: rag_retrieval_pod_details
  changed_when: false
  when: rag_retrieval_deployment_check.stat.exists
  failed_when: false

- name: Display RAG Retrieval readiness status
  debug:
    msg:
      - "RAG Retrieval pods status:"
      - "{{ rag_retrieval_pod_details.stdout_lines }}"
  when:
    - rag_retrieval_deployment_check.stat.exists
    - rag_retrieval_pod_details.stdout_lines is defined

- name: Wait for RAG Accelerator pods to be ready
  command: >
    oc wait --for=condition=ready pod
    -l app=rag
    -n {{ namespace }}
    --timeout=300s
  register: rag_ready
  changed_when: false
  retries: 2
  delay: 10
  until: rag_ready.rc == 0
  when: rag_deployment_check.stat.exists
  failed_when: false

- name: Get RAG Accelerator pod status details
  command: oc get pods -l app=rag -n {{ namespace }} -o wide
  register: rag_pod_details
  changed_when: false
  when: rag_deployment_check.stat.exists
  failed_when: false

- name: Display RAG Accelerator readiness status
  debug:
    msg:
      - "RAG Accelerator pods status:"
      - "{{ rag_pod_details.stdout_lines }}"
  when:
    - rag_deployment_check.stat.exists
    - rag_pod_details.stdout_lines is defined

- name: Get RAG route URL
  command: oc get route rag -n {{ namespace }} -o jsonpath='{.spec.host}'
  register: rag_route_url
  changed_when: false
  when: rag_route_check.stat.exists
  failed_when: false

- name: Set RAG route fact
  set_fact:
    rag_route: "https://{{ rag_route_url.stdout }}"
  when:
    - rag_route_check.stat.exists
    - rag_route_url.stdout is defined
    - rag_route_url.stdout | length > 0

- name: Display RAG route
  debug:
    msg: "RAG route: {{ rag_route }}"
  when: rag_route is defined

- name: Set deployment facts
  set_fact:
    deployment_complete: true
    backend_url: "{{ backend_route }}"
    frontend_url: "{{ frontend_route }}"
    rag_url: "{{ rag_route | default('Not deployed') }}"
    rag_retrieval_url: "{{ rag_retrieval_route | default('Not deployed') }}"

- name: Display deployment summary
  debug:
    msg:
      - "Application deployment completed successfully"
      - "Namespace: {{ namespace }}"
      - "Backend URL: {{ backend_url }}"
      - "Frontend URL: {{ frontend_url }}"
      - "RAG Accelerator URL: {{ rag_url | default('Not deployed') }}"
      - "RAG Retrieval URL: {{ rag_retrieval_url | default('Not deployed') }}"
      - "PostgreSQL: Running"
      - "All pods are ready"

